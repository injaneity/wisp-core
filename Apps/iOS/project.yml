name: WispLocalDemo
options:
  bundleIdPrefix: dev.wisp
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
packages:
  wisp:
    path: ../..
targets:
  WispLocalDemo:
    type: application
    platform: iOS
    sources:
      - path: WispLocalDemo
        excludes:
          - Info.plist
    dependencies:
      - package: wisp
        product: WispCore
      - package: wisp
        product: WispUI
    info:
      path: WispLocalDemo/Info.plist
      properties:
        CFBundleDisplayName: Wisp Local
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: Wisp uses the local network to discover and connect to your inference server.
        NSBonjourServices:
          - _wisp-llm._tcp.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.wisp.localdemo
        PRODUCT_NAME: Wisp Local
        PRODUCT_MODULE_NAME: WispLocalDemo
        CODE_SIGN_STYLE: Automatic
schemes:
  WispLocalDemo:
    build:
      targets:
        WispLocalDemo: all
    run:
      config: Debug
